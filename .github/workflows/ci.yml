name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ─── 1. Typecheck ───────────────────────────────────
      - name: Typecheck
        run: npm run typecheck

      # ─── 2. Convex: deploy schema in CI (one-shot) ─────
      # `convex dev --once` is the right command for CI: it
      # pushes the schema + functions to a temporary
      # deployment (or the configured CONVEX_DEPLOYMENT) and
      # exits without starting a watch loop. We need a real
      # CONVEX_DEPLOYMENT + access token from a maintainer —
      # until Phase 3 wires a CI deployment, this step is
      # gated behind a "convex" job that uses the convex-test
      # stack (no real Convex backend required).
      - name: Convex unit tests (convex-test)
        run: npm run convex:test

      # ─── 3. Build the Next.js app ──────────────────────
      - name: Build
        env:
          # The build doesn't need a real Convex URL; the
          # components render the seed/mock data when no
          # Convex hooks fire. Set a placeholder so
          # NEXT_PUBLIC_* inlining succeeds.
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build
